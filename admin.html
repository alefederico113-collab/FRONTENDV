<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Admin Dashboard</h1>
        <a href="index.html">Torna allo Store</a>
    </nav>
    <div class="container">
        <h2>Gestione Utenti</h2>
        <div>
            <input type="number" id="bonus-amount" placeholder="Crediti da aggiungere">
            <button onclick="giveBonus()">Assegna ad Utente 1</button>
        </div>

        <h2>Aggiungi Prodotto</h2>
        <div>
            <input type="text" id="new-name" placeholder="Nome">
            <input type="number" id="new-price" placeholder="Prezzo">
            <input type="number" id="new-stock" placeholder="Stock">
            <button onclick="addProduct()">Aggiungi</button>
        </div>

        <h2>Gestione Stock</h2>
        <div id="admin-catalog"></div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
